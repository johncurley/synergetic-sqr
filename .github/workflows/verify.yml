name: Universal Parity Verification

on: [push, pull_request]

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and Verify
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_RENDERER=OFF
          make spu-verify spu-extreme-chaos spu-collision spu-sdk-verify
          ./spu-verify
          ./spu-extreme-chaos
          ./spu-collision
          ./spu-sdk-verify

  verify-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and Verify
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_RENDERER=OFF
          make spu-verify spu-extreme-chaos spu-collision spu-sdk-verify
          ./spu-verify
          ./spu-extreme-chaos
          ./spu-collision
          ./spu-sdk-verify

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and Verify
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_RENDERER=OFF
          cmake --build . --target spu-verify spu-extreme-chaos spu-collision spu-sdk-verify --config Release
          .\Release\spu-verify.exe
          .\Release\spu-extreme-chaos.exe
          .\Release\spu-collision.exe
          .\Release\spu-sdk-verify.exe

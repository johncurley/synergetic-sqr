name: SPU-13 Purity Guard

on: [push, pull_request]

jobs:
  purity-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
          
      - name: Run Laminar Purity Audit
        env:
          SPU_PURITY_ONLY: 1
        run: |
          chmod +x tools/pre_push_audit.sh
          ./tools/pre_push_audit.sh

      - name: Verify Species Evolution
        run: |
          chmod +x tests/species_integrity_test.sh
          ./tests/species_integrity_test.sh

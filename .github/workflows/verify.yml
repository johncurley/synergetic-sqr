name: Universal Parity Verification

on: [push, pull_request]

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ build-essential
      - name: Configure
        run: cmake -B build -S . -DBUILD_RENDERER=OFF
      - name: Build
        run: cmake --build build --target spu-verify spu-extreme-chaos spu-collision spu-sdk-verify
      - name: Run Tests
        run: |
          ./build/spu-verify
          ./build/spu-extreme-chaos
          ./build/spu-collision
          ./build/spu-sdk-verify

  verify-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure
        run: cmake -B build -S . -DBUILD_RENDERER=OFF
      - name: Build
        run: cmake --build build --target spu-verify spu-extreme-chaos spu-collision spu-sdk-verify
      - name: Run Tests
        run: |
          ./build/spu-verify
          ./build/spu-extreme-chaos
          ./build/spu-collision
          ./build/spu-sdk-verify

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure
        run: cmake -B build -S . -DBUILD_RENDERER=OFF
      - name: Build
        run: cmake --build build --target spu-verify spu-extreme-chaos spu-collision spu-sdk-verify --config Release
      - name: Run Tests
        run: |
          .\build\Release\spu-verify.exe
          .\build\Release\spu-extreme-chaos.exe
          .\build\Release\spu-collision.exe
          .\build\Release\spu-sdk-verify.exe

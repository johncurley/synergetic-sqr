name: Universal Parity Verification

on: [push, pull_request]

jobs:
  laminar-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Sovereign Audit
        run: |
          chmod +x tools/pre_push_audit.sh
          # Mocking some tools for the CI environment
          mkdir -p ~/.apio/packages/oss-cad-suite/bin
          touch ~/.apio/packages/oss-cad-suite/bin/yosys
          touch ~/.apio/packages/oss-cad-suite/bin/nextpnr-ice40
          touch ~/.apio/packages/oss-cad-suite/bin/icepack
          touch ~/.apio/packages/oss-cad-suite/bin/icetime
          chmod +x ~/.apio/packages/oss-cad-suite/bin/*
          ./tools/pre_push_audit.sh

  verify-linux:
    needs: laminar-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ build-essential
      - name: Configure
        run: cmake -B build -S . -DBUILD_RENDERER=OFF
      - name: Build
        run: cmake --build build --target spu-verify spu-extreme-chaos spu-collision spu-sdk-verify
      - name: Run Tests
        run: |
          ./build/spu-verify
          ./build/spu-extreme-chaos
          ./build/spu-collision
          ./build/spu-sdk-verify

  verify-macos:
    needs: laminar-audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure
        run: cmake -B build -S . -DBUILD_RENDERER=OFF
      - name: Build
        run: cmake --build build --target spu-verify spu-extreme-chaos spu-collision spu-sdk-verify
      - name: Run Tests
        run: |
          ./build/spu-verify
          ./build/spu-extreme-chaos
          ./build/spu-collision
          ./build/spu-sdk-verify

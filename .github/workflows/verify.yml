name: SPU-13 Manifest Audit

on: [push, pull_request]

jobs:
  manifest-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Run Manifest Integrity Check
        run: |
          python3 tools/spu_sanity_check.py

      - name: Verify Species Evolution Logic
        run: |
          chmod +x tests/species_integrity_test.sh
          ./tests/species_integrity_test.sh
